<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DHMOの脅威</title>
<style>
    body {
        background-color: #f4f4f9;
        color: #333;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        max-width: 800px;
        margin: 2em auto;
        padding: 1em 2em;
        line-height: 1.6;
    }

    h1 {
        text-align: center;
        font-size: 2.5em;
        color: #2c3e50;
        border-bottom: 2px solid #2c3e50;
        padding-bottom: 0.3em;
        margin-bottom: 1em;
    }

    h2 {
        color: #34495e;
        margin-top: 1.5em;
    }

    h3 {
        color: #16a085;
        margin-top: 1.2em;
    }

    ul {
        list-style-type: disc;
        padding-left: 1.5em;
    }

    li {
        margin: 0.6em 0;
    }

    /* シンプルなカード風 */
    .card {
        background-color: #fff;
        border-radius: 8px;
        padding: 1em 1.2em;
        margin: 0.8em 0;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<h1>危険‼️ DHMOの脅威</h1>

<h2>DHMOとは❓</h2>
<div class="card">
    <ul>
        <li>水酸の一種</li>
        <li>化学物質</li>
    </ul>
</div>

<h3>何が危ないの❓</h3>
<div class="card">
    <ul>
        <li>温室効果の一因</li>
        <li>火傷を引き起こす</li>
        <li>凶悪犯罪者のほぼすべてが犯行前に摂取</li>
        <li>吸うと死ぬ</li>
        <li>酸性雨の主成分</li>
        <li>中国の工場の排水に含まれる</li>
        <li>電気事故の原因</li>
        <li>クルマのブレーキ性能低下</li>
        <li>飲んだ人の200年生存率は0%</li>
    </ul>
</div>

<h3>でもこんなに使われてる‼️</h3>
<div class="card">
    <ul>
        <li>原子力発電所で使われる</li>
        <li>防虫剤の散布に用いられる（洗ってもDHMOで汚染されたまま）</li>
        <li>ジャンクフードにも含まれる</li>
        <li>政府は学校給食にもDHMOを添加</li>
    </ul>
</div>

</body>
</html>
