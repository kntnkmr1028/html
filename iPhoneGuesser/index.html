<!DOCTYPE html><html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Guesser</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <svg width="0" height="0" style="position:absolute;left:-9999px;top:-9999px;"><defs><filter id="inset-shadow"><feGaussianBlur stdDeviation="1" result="blur"/><feOffset dx="0" dy="1" result="offset"/><feComposite operator="out" in="SourceGraphic" in2="blur" result="inverse"/><feFlood flood-color="#000" flood-opacity="0.12" result="color"/><feComposite operator="in" in="color" in2="inverse" result="shadow"/><feComposite operator="over" in="shadow" in2="SourceGraphic"/></filter></defs></svg>
<div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;"><!--タイトルとテーマボタン-->
        <h1 style="margin:0">iPhone Guesser</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button> <!--テーマ切り替えボタン-->
    </div>

    <div class="section"> <!--背面カメラ-->
        <span class="section-title">背面カメラの形状</span>
        <div class="grid" id="camera-options">
            <div class="option small" data-type="camera" data-value="斜め2眼">
                    <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3.5"/><circle cx="16" cy="16" r="3.5"/></svg>
                    <span class="label">斜め二眼</span>
            </div>
            <div class="option small" data-type="camera" data-value="縦2眼">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="3.5"/><circle cx="12" cy="17" r="3.5"/></svg>
                    <span class="label">縦二眼</span>
            </div>
            <div class="option small" data-type="camera" data-value="横2眼">
                    <svg viewBox="0 0 24 24"><circle cx="7" cy="12" r="3.5"/><circle cx="17" cy="12" r="3.5"/></svg>
                    <span class="label">横二眼</span>
            </div>
            <div class="option large" data-type="camera" data-value="一眼">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/></svg>
                    <span class="label">一眼</span>
            </div>
            <div class="option large" data-type="camera" data-value="三眼">
                    <svg viewBox="0 0 24 24"><circle cx="17" cy="12" r="3.5"/><circle cx="7" cy="7" r="3.5"/>
                    <circle cx="7" cy="17" r="3.5"/></svg>
                    <span class="label">三眼</span>
            </div>
        </div>
    </div>

    <div class="section"> <!--ディスプレイ-->
        <span class="section-title">ディスプレイ上部</span>
        <div class="grid" id="notch-options">
            <div class="option" data-type="notch" data-value="Dynamic Island">
                <svg viewBox="0 0 120 30" width="56" height="40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 -6 A10 10 0 0 0 6 4 L6 42 L114 42 L114 4 A10 10 0 0 0 104 -6 Z" fill="var(--notch-bg)" stroke="none"/>
                    <rect x="38" y="5" width="44" height="16" rx="10" fill="var(--notch-screen)" stroke="var(--notch-stroke)" stroke-width="1" filter="url(#inset-shadow)" />
                </svg>
                <span class="label">Dynamic Island</span>
            </div>
            <div class="option" data-type="notch" data-value="notch">
                <svg viewBox="0 0 120 30" width="56" height="40" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 -6 A10 10 0 0 0 6 4 L6 42 L114 42 L114 4 A10 10 0 0 0 104 -6 Z" fill="var(--notch-bg)" stroke="none"/>
                    <path d="M32 -6 L88 -6 L88 4 Q88 16 84 16 L36 16 Q32 16 32 4 Z" fill="var(--notch-screen)" stroke="var(--notch-stroke)" stroke-width="1" filter="url(#inset-shadow)" />
                </svg>
                <span class="label">ノッチ</span>
            </div>
            <div class="option" data-type="notch" data-value="home-button">
                <svg viewBox="0 0 80 135" width="48" height="66" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="72" height="127" rx="10" fill="var(--notch-bg)" stroke="none" />
                    <rect x="12" y="22" width="56" height="68" rx="6" fill="var(--notch-screen)" stroke="var(--notch-stroke)" stroke-width="0.8" />
                    <circle cx="40" cy="114" r="7" fill="var(--notch-screen)" stroke="var(--notch-stroke)" stroke-width="0.8" />
                </svg>
                <span class="label">ホームボタン</span>
            </div>
        </div>
    </div>

    <div class="section"><!--その他-->
        <span class="section-title">その他の設定</span>
        <div class="modal-subsection"> <!--画面サイズ-->
            <button class="subsection-btn" data-subsection="screen-size">
                <span class="arrow">▼</span>
                <span>画面サイズ</span>
            </button>
            <div class="subsection-content" id="screen-size-content">
                <div class="grid" id="screen-size-options">
                    <div class="option" data-type="screen-size" data-inch="3.5"><span class="label">3.5</span></div>
                    <div class="option" data-type="screen-size" data-inch="4"><span class="label">4</span></div>
                    <div class="option" data-type="screen-size" data-inch="4.7"><span class="label">4.7</span></div>
                    <div class="option" data-type="screen-size" data-inch="5.4"><span class="label">5.4</span></div>
                    <div class="option" data-type="screen-size" data-inch="5.5"><span class="label">5.5</span></div>
                    <div class="option" data-type="screen-size" data-inch="5.8"><span class="label">5.8</span></div>
                    <div class="option" data-type="screen-size" data-inch="6.1"><span class="label">6.1</span></div>
                    <div class="option" data-type="screen-size" data-inch="6.5"><span class="label">6.5</span></div>
                    <div class="option" data-type="screen-size" data-inch="6.7"><span class="label">6.7</span></div>
                    <div class="option" data-type="screen-size" data-inch="6.9"><span class="label">6.9</span></div>
                </div>
            </div>
        </div>

        <div class="modal-subsection"> <!--エッジ-->
            <button class="subsection-btn" data-subsection="edge">
                <span class="arrow">▼</span>
                <span>エッジ（側面）の形状</span>
            </button>
            <div class="subsection-content" id="edge-content">
                <div class="grid edge-grid" id="edge-options">
                    <div class="option edge-btn" data-type="edge" data-value="角">角張っている</div>
                    <div class="option edge-btn" data-type="edge" data-value="丸">丸みを帯びている</div>
                </div>
            </div>
        </div>
    </div>

    <div class="result-list" id="results"></div> <!--リザルト-->
    <button class="reset-btn" onclick="resetAll()">すべての選択をクリア</button>
</div>
<script src="script.js"></script>
<script src="https://counter.nanasi-rasi.net/counter.js"></script>
</body>
</html>
